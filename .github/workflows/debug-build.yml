name: Build debug APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22' # 修复点：满足 Capacitor 最低要求

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21' # 关键修改：从 17 升级到 21 ！！！

    - name: Install Dependencies
      run: npm install

    - name: Build Web
      run: npm run build

    - name: Sync Capacitor
      run: npx cap sync android


    - name: Bump Version Code
      run: |
        # 自动将 android/app/build.gradle 里的 versionCode 改为 GitHub 的运行编号
        # 自动将 versionName 改为 1.0.序号
        sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" android/app/build.gradle
        sed -i "s/versionName \".*\"/versionName \"1.0.${{ github.run_number }}\"/" android/app/build.gradle


    - name: Build APK
      working-directory: ./android
      run: |
        # 确保 gradlew 有执行权限
        if [ -f "gradlew" ]; then
          chmod +x gradlew
          ./gradlew assembleDebug
        else
          echo "Error: gradlew not found in ./android"
          exit 1
        fi

    - name: Sign Debug APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: android/app/build/outputs/apk/debug
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}
      env:
        # 核心修复点：手动指定 Build Tools 的路径，跳过 29.0.3 的死循环
        BUILD_TOOLS_VERSION: "34.0.0"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: stockpile-app-DEBUG-v0.${{ github.run_number }}
        path: ${{ steps.sign_app.outputs.signedReleaseFile }}