name: Build Android APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22' # 修复点：满足 Capacitor 最低要求

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21' # 关键修改：从 17 升级到 21 ！！！

    - name: Install Dependencies
      run: npm install

    - name: Build Web
      run: npm run build

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Build APK
      working-directory: ./android
      run: |
        # 确保 gradlew 有执行权限
        if [ -f "gradlew" ]; then
          chmod +x gradlew
          ./gradlew assembleDebug
        else
          echo "Error: gradlew not found in ./android"
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: stockpile-app-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk