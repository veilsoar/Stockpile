name: Build Android APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # 升级到 v4

    - name: Setup Node.js
      uses: actions/setup-node@v4 # 升级到 v4
      with:
        node-version: '20' # 建议用更新的 Node 版本

    - name: Setup Java
      uses: actions/setup-java@v4 # 升级到 v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Dependencies
      run: npm install

    - name: Build Web
      run: npm run build

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Build APK
      working-directory: ./android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4 # 核心修复点：这里必须是 v4
      with:
        name: stockpile-app-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk